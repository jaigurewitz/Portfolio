  #desktop-area {
    flex: 1; position: relative; z-index: 1;
    padding: 12px;
    overflow: hidden;
  }

  /* ═══ DESKTOP ICONS ═══ */
  .desktop-icon {
    width: 74px;
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 4px; cursor: pointer;
    border-radius: 3px; border: 1px solid transparent;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
  .desktop-icon.selected { background: rgba(49,106,197,0.45); border-color: rgba(49,106,197,0.7); }
  .desktop-icon .icon-img { width: 48px; height: 48px; pointer-events: none; }
  .icon-label {
    color: #fff; text-align: center; font-size: 11px;
    line-height: 1.25; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    word-break: break-word; max-width: 72px;
  }

  /* ═══ XP WINDOW ═══ */
  .window {
    position: absolute; display: flex; flex-direction: column;
    min-width: 260px; min-height: 160px;
    border-radius: 8px 8px 0 0;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,50,200,0.4);
    overflow: hidden; background: var(--xp-bg);
  }
  .window.maximized {
    left: 0 !important; top: 0 !important;
    width: 100% !important; height: calc(100% - 38px) !important;
    border-radius: 0;
  }
  .title-bar {
    background: linear-gradient(180deg, #0997ff 0%, #0561d2 8%, #0654c7 18%, #0058ee 28%, #0058ee 48%, #096bef 62%, #1482f0 78%, #3b96ff 100%);
    color: #fff; display: flex; align-items: center;
    padding: 4px 6px; gap: 4px; cursor: default;
    flex-shrink: 0; height: 30px; border-radius: 8px 8px 0 0;
  }
  .title-bar.inactive {
    background: linear-gradient(180deg, #b4bdd0 0%, #8e9abc 20%, #7a8ab5 50%, #8fa0ca 80%, #a6b4d4 100%);
  }
  .window.maximized .title-bar { border-radius: 0; }
  .title-bar-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .title-bar-text {
    flex: 1; font-weight: bold; font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4); padding-left: 2px;
  }
  .title-bar-controls { display: flex; gap: 2px; }
  .xp-btn {
    width: 22px; height: 22px; border: none; outline: none;
    border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset, 0 -1px 0 rgba(0,0,0,0.15) inset;
  }
  .xp-btn-min, .xp-btn-max { background: linear-gradient(180deg, #3c8cf3 0%, #1a60d2 50%, #1555c4 100%); }
  .xp-btn-close { background: linear-gradient(180deg, #e88a68 0%, #d45040 40%, #c02b1c 70%, #b71a0c 100%); }
  .xp-btn:hover { filter: brightness(1.15); }
  .xp-btn:active { filter: brightness(0.9); }
  .xp-btn svg { width: 12px; height: 12px; pointer-events: none; }

  .window-body {
    flex: 1; overflow: auto; background: #fff;
    border: 2px inset #aca899; margin: 2px 4px; position: relative;
  }
  .status-bar { display: flex; padding: 2px 4px; flex-shrink: 0; background: var(--xp-bg); }
  .status-bar-field { flex: 1; padding: 2px 8px; font-size: 11px; border: 1px inset #aca899; background: #f1efe2; }

  /* ═══ FOLDER VIEW ═══ */
  .folder-grid {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 10px; align-content: flex-start;
  }
  .folder-item {
    width: 90px; display: flex; flex-direction: column;
    align-items: center; gap: 3px; padding: 6px 4px;
    cursor: pointer; border: 1px solid transparent; border-radius: 3px;
  }
  .folder-item:hover { background: var(--xp-highlight-light); border-color: var(--xp-highlight); }
  .folder-item .fi-icon { width: 32px; height: 32px; }
  .folder-item .fi-label { text-align: center; font-size: 11px; word-break: break-word; }

  /* ═══ IMAGE VIEWER (Mac-style with nav) ═══ */
  .image-viewer {
    display: flex; align-items: center; justify-content: center;
    background: #1a1a2e; width: 100%; height: 100%; position: relative;
    overflow: hidden;
  }
  .image-viewer img {
    max-width: calc(100% - 80px); max-height: calc(100% - 40px);
    object-fit: contain;
    transition: opacity 0.25s ease;
  }
  .image-viewer img.fading { opacity: 0; }
  .iv-nav {
    position: absolute; top: 0; bottom: 0; width: 50px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity 0.2s;
    z-index: 2;
  }
  .image-viewer:hover .iv-nav { opacity: 1; }
  .iv-nav:hover { background: rgba(255,255,255,0.08); }
  .iv-nav.left { left: 0; }
  .iv-nav.right { right: 0; }
  .iv-nav svg { width: 28px; height: 28px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
  .iv-counter {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #ccc; padding: 3px 12px;
    border-radius: 10px; font-size: 11px; z-index: 2;
  }
  .iv-dots {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 2;
    background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 10px;
  }
  .iv-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.35); cursor: pointer;
    transition: background 0.2s;
  }
  .iv-dot.active { background: #fff; }
  .iv-dot:hover { background: rgba(255,255,255,0.7); }

  /* ═══ VIDEO PLAYER ═══ */
  .video-player-wrap {
    background: #0a0a12; width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }
  .video-player-wrap video {
    flex: 1; width: 100%; min-height: 0; background: #000; object-fit: contain;
  }
  .video-drop-zone {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: #8a8aad; border: 2px dashed #3a3a5c;
    margin: 20px; border-radius: 8px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .video-drop-zone:hover, .video-drop-zone.dragover { border-color: #6a6aff; color: #b0b0e0; }
  .video-drop-zone svg { width: 48px; height: 48px; opacity: 0.6; }
  .video-drop-zone p { font-size: 13px; text-align: center; line-height: 1.5; }
  .video-toolbar {
    display: flex; align-items: center; gap: 6px; padding: 6px 10px;
    background: linear-gradient(180deg, #2a2a3e, #1e1e30); flex-shrink: 0;
  }
  .video-toolbar button {
    background: linear-gradient(180deg, #454568, #2f2f4a);

  /* ═══ TASKBAR ═══ */
  #taskbar {
    height: 38px;
    background: linear-gradient(180deg, #245edb 0%, #2966e0 3%, #1c56d0 6%, #1450cc 50%, #1450cc 54%, #1856d0 58%, #2362dd 80%, #3c80f0 95%, #4a8cf8 100%);

  .taskbar-sep { width: 2px; height: 24px; background: rgba(255,255,255,0.12); margin: 0 3px; }

  .taskbar-item {
    height: 28px; min-width: 140px; max-width: 180px; padding: 0 10px;
    display: flex; align-items: center; gap: 5px; font-size: 11px;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    background: linear-gradient(180deg, #3c89e8 0%, #2a6fd6 50%, #2565cc 100%);

  .taskbar-item.active {

  .taskbar-tray {

  .taskbar-clock { font-size: 11px; color: #fff; text-shadow: 0 1px 1px rgba(0,0,0,0.3); }

  /* ═══ START MENU ═══ */
  #start-menu {
    position: absolute; bottom: 38px; left: 0; width: 380px;
    background: #fff; display: none; z-index: 10000;

  }
  .start-item:hover { background: var(--xp-highlight); color: #fff; }
  .start-item svg { width: 24px; height: 24px; flex-shrink: 0; }
  .start-right .start-item { font-weight: bold; color: #1a3c7a; }
  .start-sep { height: 1px; background: #d6d2c2; margin: 4px 12px; }
  .start-footer {
    background: linear-gradient(180deg, #2a72e5 0%, #1a56c4 100%);
    padding: 6px 12px;
  }

  .resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 14px; height: 14px; cursor: nwse-resize; z-index: 5;
  }
  .resize-handle::after {
    content: ''; position: absolute; bottom: 2px; right: 2px;
    width: 8px; height: 8px;
    background: linear-gradient(135deg, transparent 30%, #999 30%, #999 40%, transparent 40%, transparent 60%, #999 60%, #999 70%, transparent 70%);
  }
</style>
</head>

        <div class="start-item" onclick="openFolder('Forsborne')"><svg viewBox="0 0 24 24"><rect fill="#FFC940" x="1" y="6" width="22" height="15" rx="2"/><rect fill="#E6B200" x="1" y="4" width="10" height="5" rx="2"/></svg>Forsborne</div>

        <div class="start-item" onclick="openAbout()"><svg viewBox="0 0 24 24"><circle fill="#0054E3" cx="12" cy="12" r="10"/><text x="12" y="17" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">i</text></svg>About Me</div>
        <div class="start-item" onclick="openContact()"><svg viewBox="0 0 24 24"><rect fill="#f0e8c0" x="2" y="5" width="20" height="14" rx="1"/><path d="M2 5 L12 14 L22 5" fill="none" stroke="#c0a040" stroke-width="1.5"/></svg>Contact</div>

      <svg viewBox="0 0 20 20"><rect fill="#FF4500" x="1" y="1" width="8" height="8" rx="1"/><rect fill="#00AA00" x="11" y="1" width="8" height="8" rx="1"/><rect fill="#0066FF" x="1" y="11" width="8" height="8" rx="1"/><rect fill="#FFCC00" x="11" y="11" width="8" height="8" rx="1"/></svg>
      start
    </button>
    <div class="taskbar-sep"></div>

<script>
const PORTFOLIO = {
  ownerName: "Your Name",
  bio: "Welcome to my portfolio! Browse through my collections by double-clicking the folders on the desktop, or use the Start menu.",
  contact: "email@example.com",
  folders: {
    "Digital Art": [
      { name: "piece_01.jpg", src: "", desc: "Neon Dreams" },
      { name: "piece_02.jpg", src: "", desc: "Cybervoid" },
      { name: "piece_03.jpg", src: "", desc: "Solar Flare" },
      { name: "piece_04.jpg", src: "", desc: "Ghost Signal" },
    ],
    "Film": [
      { name: "still_01.jpg", src: "", desc: "Golden Hour" },
      { name: "still_02.jpg", src: "", desc: "Darkroom Print" },
      { name: "still_03.jpg", src: "", desc: "Silver Halide" },
    ],
    "Magazines": [
      { name: "mag_01.jpg", src: "", desc: "Issue 01 Cover" },
      { name: "mag_02.jpg", src: "", desc: "Editorial Spread" },
      { name: "mag_03.jpg", src: "", desc: "Feature Layout" },
    ],
    "Forsborne": [
      { name: "fors_01.jpg", src: "", desc: "Forsborne I" },
      { name: "fors_02.jpg", src: "", desc: "Forsborne II" },
      { name: "fors_03.jpg", src: "", desc: "Forsborne III" },
      { name: "fors_04.jpg", src: "", desc: "Forsborne IV" },
    ],
    "Videos": [
      { name: "reel_01.mp4", src: "", desc: "Demo Reel", type: "video" },
      { name: "project_01.mp4", src: "", desc: "Short Film", type: "video" },
      { name: "bts_01.mp4", src: "", desc: "Behind the Scenes", type: "video" },
    ],
  }
};

// Placeholder generator
function genPlaceholder(text, hue) {
  const c = document.createElement('canvas');
  c.width = 640; c.height = 480;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,640,480);
  g.addColorStop(0, `hsl(${hue},35%,18%)`);
  g.addColorStop(1, `hsl(${hue+60},40%,22%)`);
  ctx.fillStyle = g; ctx.fillRect(0,0,640,480);
  for(let i=0;i<5;i++){ctx.fillStyle=`hsla(${hue+i*40},50%,50%,0.12)`;ctx.beginPath();ctx.arc(Math.random()*640,Math.random()*480,50+Math.random()*100,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#fff';ctx.font='bold 24px Tahoma,sans-serif';ctx.textAlign='center';ctx.fillText(text,320,230);
  ctx.font='14px Tahoma';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('Replace with your image',320,260);
  return c.toDataURL('image/jpeg',0.85);
}
let hC=0;
Object.values(PORTFOLIO.folders).forEach(items=>items.forEach(item=>{if(!item.src&&item.type!=='video'){item.src=genPlaceholder(item.desc,hC);hC+=50;}}));
document.getElementById('start-user-name').textContent=PORTFOLIO.ownerName;

// ═══ Window Manager ═══
let windows=[],zIdx=100,activeWinId=null;
function wid(){return 'w'+Date.now()+Math.random().toString(36).slice(2,5);}

const folderSvg16=`<svg viewBox="0 0 16 16"><rect fill="#FFC940" x="1" y="4" width="14" height="10" rx="1"/><rect fill="#E6B200" x="1" y="3" width="6" height="3" rx="1"/></svg>`;
const imgSvg16=`<svg viewBox="0 0 16 16"><rect fill="#fff" x="1" y="1" width="14" height="14" stroke="#888" stroke-width="0.5"/><rect fill="#87CEEB" x="3" y="3" width="10" height="6"/></svg>`;
const vidSvg16=`<svg viewBox="0 0 16 16"><rect fill="#2a3a5a" x="1" y="2" width="14" height="12" rx="1"/><polygon fill="#fff" points="6,4 6,12 12,8"/></svg>`;
const folderSvg48=`<svg viewBox="0 0 48 48"><rect fill="#FFC940" x="2" y="12" width="44" height="30" rx="3"/><rect fill="#E6B200" x="2" y="8" width="20" height="8" rx="2"/><rect fill="#FFD970" x="4" y="14" width="40" height="2" rx="1"/></svg>`;
const imgSvg48=`<svg viewBox="0 0 48 48"><rect fill="#fff" x="4" y="2" width="40" height="44" rx="2" stroke="#aaa"/><rect fill="#87CEEB" x="8" y="6" width="32" height="20"/><circle fill="#FFD700" cx="16" cy="14" r="4"/><polygon fill="#228B22" points="12,26 24,14 36,26"/></svg>`;
const vidSvg48=`<svg viewBox="0 0 48 48"><rect fill="#2a3a5a" x="4" y="6" width="40" height="36" rx="3"/><rect fill="#1a2a4a" x="6" y="8" width="36" height="28" rx="2"/><polygon fill="rgba(255,255,255,0.8)" points="18,12 18,32 34,22"/><rect fill="#4a6a9a" x="4" y="38" width="40" height="4" rx="1"/></svg>`;
const aboutSvg48=`<svg viewBox="0 0 48 48"><circle fill="#0054E3" cx="24" cy="24" r="20"/><text x="24" y="33" text-anchor="middle" fill="#fff" font-size="26" font-weight="bold">i</text></svg>`;
const contactSvg48=`<svg viewBox="0 0 48 48"><rect fill="#f5ecd0" x="4" y="10" width="40" height="28" rx="2"/><path d="M4 10 L24 28 L44 10" fill="none" stroke="#c8a840" stroke-width="2"/></svg>`;
const pcSvg48=`<svg viewBox="0 0 48 48"><rect fill="#808080" x="6" y="2" width="36" height="28" rx="3"/><rect fill="#0054E3" x="9" y="5" width="30" height="22" rx="1"/><rect fill="#c0c0c0" x="16" y="30" width="16" height="5"/><rect fill="#aaa" x="12" y="35" width="24" height="4" rx="2"/></svg>`;

function createWindow({title,icon,width,height,x,y,content,id,onCreated}){
  const wId=id||wid();
  if(windows.find(w=>w.id===wId)){focusWindow(wId);return wId;}
  const win=document.createElement('div');
  win.className='window';win.id=wId;
  win.style.width=(width||540)+'px';win.style.height=(height||400)+'px';
  win.style.left=(x??80+windows.length*28)+'px';win.style.top=(y??30+windows.length*28)+'px';
  win.style.zIndex=++zIdx;
  const ic=icon||folderSvg16;
  win.innerHTML=`
    <div class="title-bar"><span class="title-bar-icon">${ic}</span><span class="title-bar-text">${title}</span>
      <div class="title-bar-controls">
        <button class="xp-btn xp-btn-min" onclick="minimizeWindow('${wId}')"><svg viewBox="0 0 12 12"><rect x="2" y="9" width="8" height="2" fill="#fff"/></svg></button>
        <button class="xp-btn xp-btn-max" onclick="maximizeWindow('${wId}')"><svg viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" fill="none" stroke="#fff" stroke-width="1.5"/><rect x="2" y="2" width="8" height="2" fill="#fff"/></svg></button>
        <button class="xp-btn xp-btn-close" onclick="closeWindow('${wId}')"><svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="#fff" stroke-width="2"/><line x1="10" y1="2" x2="2" y2="10" stroke="#fff" stroke-width="2"/></svg></button>
      </div>
    </div>
    <div class="window-body">${content}</div>
    <div class="status-bar"><div class="status-bar-field">${title}</div></div>
    <div class="resize-handle"></div>`;
  document.getElementById('desktop-area').appendChild(win);
  windows.push({id:wId,title,el:win,minimized:false});
  updateTaskbar();focusWindow(wId);makeDraggable(win);makeResizable(win);
  if(onCreated)onCreated(win,wId);
  return wId;
}
function focusWindow(id){activeWinId=id;windows.forEach(w=>{const tb=w.el.querySelector('.title-bar');if(w.id===id){w.el.style.zIndex=++zIdx;tb.classList.remove('inactive');}else{tb.classList.add('inactive');}});updateTaskbar();}
function closeWindow(id){const i=windows.findIndex(w=>w.id===id);if(i===-1)return;const el=windows[i].el;if(el._keyHandler)document.removeEventListener('keydown',el._keyHandler);el.remove();windows.splice(i,1);if(activeWinId===id)activeWinId=windows.length?windows[windows.length-1].id:null;if(activeWinId)focusWindow(activeWinId);updateTaskbar();}
function minimizeWindow(id){const w=windows.find(w=>w.id===id);if(!w)return;w.minimized=true;w.el.style.display='none';if(activeWinId===id){const v=windows.filter(w2=>!w2.minimized);activeWinId=v.length?v[v.length-1].id:null;if(activeWinId)focusWindow(activeWinId);}updateTaskbar();}
function maximizeWindow(id){const w=windows.find(w=>w.id===id);if(!w)return;w.el.classList.toggle('maximized');}
function restoreWindow(id){const w=windows.find(w=>w.id===id);if(!w)return;if(w.minimized){w.minimized=false;w.el.style.display='flex';}focusWindow(id);}
function updateTaskbar(){const c=document.getElementById('taskbar-items');c.innerHTML='';windows.forEach(w=>{const b=document.createElement('button');b.className='taskbar-item'+(w.id===activeWinId?' active':'');b.textContent=w.title;b.onclick=()=>{if(w.id===activeWinId&&!w.minimized)minimizeWindow(w.id);else restoreWindow(w.id);};c.appendChild(b);});}
function makeDraggable(win){const tb=win.querySelector('.title-bar');let d=false,ox,oy;tb.addEventListener('mousedown',e=>{if(e.target.closest('button'))return;d=true;ox=e.clientX-win.offsetLeft;oy=e.clientY-win.offsetTop;focusWindow(win.id);});document.addEventListener('mousemove',e=>{if(!d)return;win.style.left=(e.clientX-ox)+'px';win.style.top=(e.clientY-oy)+'px';});document.addEventListener('mouseup',()=>{d=false;});win.addEventListener('mousedown',()=>focusWindow(win.id));}
function makeResizable(win){const h=win.querySelector('.resize-handle');if(!h)return;let r=false,sx,sy,sw,sh;h.addEventListener('mousedown',e=>{e.stopPropagation();r=true;sx=e.clientX;sy=e.clientY;sw=win.offsetWidth;sh=win.offsetHeight;});document.addEventListener('mousemove',e=>{if(!r)return;win.style.width=Math.max(260,sw+e.clientX-sx)+'px';win.style.height=Math.max(160,sh+e.clientY-sy)+'px';});document.addEventListener('mouseup',()=>{r=false;});}

function toggleStart(){document.getElementById('start-menu').classList.toggle('open');}
document.addEventListener('click',e=>{const sm=document.getElementById('start-menu');const sb=document.getElementById('start-btn');if(!sm.contains(e.target)&&!sb.contains(e.target))sm.classList.remove('open');});

function updateClock(){const n=new Date(),h=n.getHours(),m=n.getMinutes();document.getElementById('clock').textContent=`${h%12||12}:${m.toString().padStart(2,'0')} ${h>=12?'PM':'AM'}`;}
updateClock();setInterval(updateClock,30000);

// ═══ Portfolio Functions ═══
function openFolder(name){
  document.getElementById('start-menu').classList.remove('open');
  const items=PORTFOLIO.folders[name];if(!items)return;
  const isVid=name==='Videos';
  let grid='';
  items.forEach((item,i)=>{
    const ico=item.type==='video'?vidSvg48:imgSvg48;
    const action=item.type==='video'?`openVideoPlayer('${name}',${i})`:`openImage('${name}',${i})`;
    grid+=`<div class="folder-item" ondblclick="${action}"><div class="fi-icon">${ico}</div><div class="fi-label">${item.name}</div></div>`;
  });
  createWindow({
    title:name,icon:folderSvg16,width:500,height:360,
    content:`<div class="folder-grid">${grid}</div>`,
    id:'folder-'+name.replace(/\s/g,'')
  });
}

function openImage(folder,index){
  const items=PORTFOLIO.folders[folder].filter(it=>it.type!=='video');
  const total=items.length;
  let cur=index;
  // Clamp index to filtered items
  if(cur>=total)cur=0;

  function getViewerHtml(i){
    const item=items[i];
    const leftArrow=`<svg viewBox="0 0 28 28"><path d="M18 4 L8 14 L18 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const rightArrow=`<svg viewBox="0 0 28 28"><path d="M10 4 L20 14 L10 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    let dots='';
    for(let d=0;d<total;d++){dots+=`<div class="iv-dot${d===i?' active':''}" data-idx="${d}"></div>`;}
    return `<div class="image-viewer" id="iv-gallery">
      <div class="iv-nav left" id="iv-prev">${leftArrow}</div>
      <img src="${item.src}" alt="${item.desc}" id="iv-img">
      <div class="iv-nav right" id="iv-next">${rightArrow}</div>
      ${total<=12?`<div class="iv-dots" id="iv-dots">${dots}</div>`:`<div class="iv-counter" id="iv-counter">${i+1} / ${total}</div>`}
    </div>`;
  }

  const wId=createWindow({title:`${items[cur].desc} — ${folder}`,icon:imgSvg16,width:600,height:480,
    content:getViewerHtml(cur),
    onCreated:(win)=>{
      function goTo(newIdx){
        if(newIdx<0)newIdx=total-1;
        if(newIdx>=total)newIdx=0;
        cur=newIdx;
        const img=win.querySelector('#iv-img');
        img.classList.add('fading');
        setTimeout(()=>{
          img.src=items[cur].src;
          img.alt=items[cur].desc;
          img.classList.remove('fading');
        },150);
        // Update title
        win.querySelector('.title-bar-text').textContent=`${items[cur].desc} — ${folder}`;
        win.querySelector('.status-bar-field').textContent=`${cur+1} of ${total} · ${items[cur].desc}`;
        // Update dots or counter
        const dots=win.querySelectorAll('.iv-dot');
        if(dots.length){dots.forEach((d,di)=>d.classList.toggle('active',di===cur));}
        const counter=win.querySelector('#iv-counter');
        if(counter)counter.textContent=`${cur+1} / ${total}`;
      }
      win.querySelector('#iv-prev').addEventListener('click',e=>{e.stopPropagation();goTo(cur-1);});
      win.querySelector('#iv-next').addEventListener('click',e=>{e.stopPropagation();goTo(cur+1);});
      // Dot clicks
      const dotsEl=win.querySelector('#iv-dots');
      if(dotsEl)dotsEl.addEventListener('click',e=>{const idx=e.target.dataset.idx;if(idx!=null)goTo(parseInt(idx));});
      // Keyboard nav when this window is focused
      const keyHandler=(e)=>{
        if(activeWinId!==wId)return;
        if(e.key==='ArrowLeft')goTo(cur-1);
        else if(e.key==='ArrowRight')goTo(cur+1);
      };
      document.addEventListener('keydown',keyHandler);
      // Store cleanup ref
      win._keyHandler=keyHandler;
    }
  });
  if(wId){const win=document.getElementById(wId);win.querySelector('.status-bar-field').textContent=`${cur+1} of ${total} · ${items[cur].desc}`;}
}

// ═══ VIDEO PLAYER ═══
let vpCounter=0;
function openVideoPlayer(folder,index){
  const item=PORTFOLIO.folders[folder][index];
  const hasSrc=item.src&&item.src.length>0;
  const vpId=vpCounter++;
  createWindow({
    title:`${item.desc} — Media Player`,icon:vidSvg16,width:620,height:480,
    content:`<div class="video-player-wrap" id="vpw-${vpId}">
      ${hasSrc?`<video controls autoplay><source src="${item.src}"></video>`
      :`<div class="video-drop-zone" id="vdz-${vpId}">
        <svg viewBox="0 0 48 48"><rect fill="#2a3a5a" x="4" y="6" width="40" height="36" rx="3"/><polygon fill="rgba(255,255,255,0.5)" points="18,12 18,32 34,22"/></svg>
        <p><b>${item.desc}</b><br>Drag &amp; drop a video file here<br>or click to browse</p>
        <input type="file" accept="video/*" style="display:none" id="vfi-${vpId}">
      </div>`}
      <div class="video-toolbar">
        <button onclick="document.getElementById('vfi-tb-${vpId}').click()">Open File...</button>
        <input type="file" accept="video/*" style="display:none" id="vfi-tb-${vpId}">
        <span class="video-name" id="vname-${vpId}">${hasSrc?item.name:'No file loaded'}</span>
      </div>
    </div>`,
    onCreated:(win)=>{
      win.querySelector(`#vfi-tb-${vpId}`).addEventListener('change',e=>loadVid(e.target.files[0],vpId,win));
      if(!hasSrc){
        const zone=win.querySelector(`#vdz-${vpId}`);
        const fi=win.querySelector(`#vfi-${vpId}`);
        zone.addEventListener('click',()=>fi.click());
        fi.addEventListener('change',e=>loadVid(e.target.files[0],vpId,win));
        zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');});
        zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
        zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');if(e.dataTransfer.files.length)loadVid(e.dataTransfer.files[0],vpId,win);});
      }
    }
  });
}

function loadVid(file,vpId,win){
  if(!file)return;
  const url=URL.createObjectURL(file);
  const wrap=win.querySelector(`#vpw-${vpId}`);
  const dz=wrap.querySelector('.video-drop-zone');if(dz)dz.remove();
  const old=wrap.querySelector('video');if(old)old.remove();
  const toolbar=wrap.querySelector('.video-toolbar');
  const v=document.createElement('video');
  v.controls=true;v.autoplay=true;v.src=url;
  v.style.cssText='flex:1;width:100%;min-height:0;background:#000;object-fit:contain;';
  wrap.insertBefore(v,toolbar);
  const nm=wrap.querySelector(`#vname-${vpId}`);if(nm)nm.textContent=file.name;
}

// Desktop icons — random positions on each load
const iconW=86,iconH=90;
const placedIcons=[];
function getRandomPos(){
  const area=document.getElementById('desktop-area');
  const aW=area.clientWidth-iconW-20;
  const aH=area.clientHeight-iconH-20;
  let attempts=0,x,y;
  do {
    x=10+Math.random()*aW;
    y=10+Math.random()*aH;
    attempts++;
    // Check no overlap with existing icons
    const overlap=placedIcons.some(p=>Math.abs(p.x-x)<iconW&&Math.abs(p.y-y)<iconH);
    if(!overlap||attempts>80){placedIcons.push({x,y});return{x,y};}
  } while(attempts<80);
  placedIcons.push({x,y});return{x,y};
}
function dIcon(label,svg,fn){
  const d=document.createElement('div');d.className='desktop-icon';
  d.innerHTML=`<div class="icon-img">${svg}</div><div class="icon-label">${label}</div>`;
  const pos=getRandomPos();
  d.style.left=pos.x+'px';d.style.top=pos.y+'px';
  d.addEventListener('dblclick',fn);
  d.addEventListener('click',()=>{document.querySelectorAll('.desktop-icon').forEach(i=>i.classList.remove('selected'));d.classList.add('selected');});
  document.getElementById('desktop-area').appendChild(d);
}
dIcon('My Portfolio',pcSvg48,openMyPortfolio);
Object.keys(PORTFOLIO.folders).forEach(n=>{dIcon(n,n==='Videos'?vidSvg48:folderSvg48,()=>openFolder(n));});
dIcon('About Me',aboutSvg48,openAbout);
dIcon('Contact',contactSvg48,openContact);

document.getElementById('desktop-area').addEventListener('click',e=>{if(e.target===document.getElementById('desktop-area'))document.querySelectorAll('.desktop-icon').forEach(d=>d.classList.remove('selected'));});

    id:'welcome-win'});
},300);
